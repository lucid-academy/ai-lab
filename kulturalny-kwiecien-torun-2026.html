<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kulturalny Kwiecien - Torun 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAF7F2;
  --bg-card: #FFFFFF;
  --bg-hover: #F5F0E8;
  --text: #2C2418;
  --text-secondary: #7A6F5F;
  --text-light: #A89F8F;
  --accent: #B8860B;
  --accent-light: #DAA520;
  --border: #E8E0D4;
  --border-light: #F0EBE3;
  --shadow: rgba(44,36,24,0.06);
  --radius: 10px;
}

body {
  font-family: 'Source Sans 3', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.header {
  padding: 40px 24px 28px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #FDF9F3 0%, var(--bg) 100%);
}
.header-label {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  font-weight: 600;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 6vw, 44px);
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.15;
}
.header-sub {
  font-size: 15px;
  color: var(--text-secondary);
  font-weight: 300;
}
.header-sub strong { font-weight: 600; color: var(--accent); }

.container { max-width: 800px; margin: 0 auto; padding: 0 16px; }

/* Search */
.search-wrap {
  padding: 20px 0 0;
}
.search-wrap input {
  width: 100%;
  padding: 14px 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 15px;
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg-card);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus {
  border-color: var(--accent-light);
  box-shadow: 0 0 0 3px rgba(184,134,11,0.08);
}
.search-wrap input::placeholder { color: var(--text-light); }

/* Filters */
.filters {
  padding: 14px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.pill {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  font-size: 12px;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
}
.pill:hover { border-color: var(--accent-light); color: var(--accent); }
.pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.controls {
  padding: 0 0 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.controls select {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
}
.btn-filter {
  padding: 7px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: transparent;
  font-size: 12px;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-filter:hover { border-color: var(--accent-light); }
.btn-filter.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-clear {
  padding: 7px 16px;
  border-radius: var(--radius);
  border: none;
  background: rgba(184,134,11,0.1);
  font-size: 12px;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 500;
  color: var(--accent);
  cursor: pointer;
}

/* Calendar strip */
.cal-strip {
  padding: 0 0 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.cal-strip::-webkit-scrollbar { display: none; }
.cal-days {
  display: flex;
  gap: 3px;
  min-width: max-content;
}
.cal-day {
  width: 34px;
  padding: 5px 0;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: transparent;
  color: var(--text-light);
  transition: all 0.15s;
  font-family: 'Source Sans 3', sans-serif;
}
.cal-day:hover { background: var(--bg-hover); }
.cal-day.has-events { background: rgba(184,134,11,0.06); color: var(--text-secondary); }
.cal-day.selected { background: var(--accent); color: #fff; }
.cal-day.weekend { color: var(--accent); }
.cal-day.selected.weekend { color: #fff; }
.cal-day-label { font-size: 9px; font-weight: 600; text-transform: uppercase; }
.cal-day-num { font-size: 15px; font-weight: 600; }
.cal-day-count { font-size: 8px; opacity: 0.7; }

/* Date group */
.date-group { margin-bottom: 28px; }
.date-header {
  position: sticky;
  top: 0;
  z-index: 10;
  padding: 10px 0;
  background: var(--bg);
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
  border-bottom: 1px solid var(--border-light);
  text-transform: capitalize;
}

/* Event card */
.event {
  padding: 16px 0;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: background 0.1s;
}
.event:hover { background: rgba(184,134,11,0.02); margin: 0 -8px; padding: 16px 8px; border-radius: 8px; }
.event-row { display: flex; gap: 14px; align-items: flex-start; }
.event-time {
  min-width: 50px;
  text-align: center;
  padding-top: 2px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-light);
  font-variant-numeric: tabular-nums;
}
.event-body { flex: 1; min-width: 0; }
.event-title-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.event-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.event-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(16px, 2.5vw, 19px);
  font-weight: 600;
  line-height: 1.3;
  color: var(--text);
}
.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge-free { background: rgba(34,139,34,0.1); color: #228B22; }
.badge-sold { background: rgba(178,34,34,0.1); color: #B22222; }
.event-meta {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 4px;
}
.event-meta .venue { color: var(--text-secondary); font-weight: 500; }

/* Expanded detail */
.event-detail {
  margin-top: 14px;
  padding: 16px;
  background: var(--bg-hover);
  border-radius: var(--radius);
  border-left: 3px solid var(--accent-light);
  animation: slideDown 0.2s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.event-detail p {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 10px;
}
.event-detail .detail-info {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.event-detail .detail-info strong { color: var(--text); font-weight: 600; }
.event-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  background: rgba(184,134,11,0.08);
  color: var(--accent);
  cursor: pointer;
  border: 1px solid rgba(184,134,11,0.15);
  font-weight: 500;
  transition: all 0.1s;
}
.tag:hover { background: rgba(184,134,11,0.15); }

.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}
.empty p { font-size: 15px; }

.footer {
  padding: 24px;
  text-align: center;
  border-top: 1px solid var(--border);
  margin-top: 20px;
}
.footer p {
  font-size: 12px;
  color: var(--text-light);
  font-weight: 300;
}

.count-badge {
  display: inline-block;
  min-width: 24px;
  text-align: center;
  padding: 2px 8px;
  border-radius: 12px;
  background: rgba(184,134,11,0.1);
  color: var(--accent);
  font-size: 13px;
  font-weight: 600;
  margin-left: 6px;
}
</style>
</head>

];

const CATS=[...new Set(EVENTS.map(e=>e.cat))].sort();
const AUDS=["wszyscy","dorosli","dzieci","mlodziez","rodziny"];
const AUD_L={wszyscy:"Wszyscy",dorosli:"Dorosli",dzieci:"Dzieci",mlodziez:"Mlodziez",rodziny:"Rodziny"};
const CC={muzyka:'#C4722C',teatr:'#7B68AE',wystawa:'#3A8C5C',warsztaty:'#C9950F',film:'#4A7AB5',wyklad:'#8B6BAE',spotkanie:'#C4587A',literatura:'#2E8B6A',kabaret:'#D4960F',pokaz:'#2A9AAE',piknik:'#44A855',debata:'#9060C0',taniec:'#C75060'};
const DAYS=[];
for(let i=1;i<=30;i++){DAYS.push({date:"2026-04-"+String(i).padStart(2,"0"),num:i});}

let state={search:"",cats:new Set(),aud:"",free:false,mode:"list",open:null,day:null};

function dow(d){return["Nd","Pn","Wt","Sr","Cz","Pt","So"][new Date(d+"T12:00:00").getDay()];}
function fmtDate(d){return new Date(d+"T12:00:00").toLocaleDateString("pl-PL",{weekday:"long",day:"numeric",month:"long"});}

function filter(){
  return EVENTS.filter(e=>{
    const q=state.search.toLowerCase();
    if(q&&!e.name.toLowerCase().includes(q)&&!e.desc.toLowerCase().includes(q)&&!e.venue.toLowerCase().includes(q)&&!e.tags.some(t=>t.includes(q)))return false;
    if(state.cats.size>0&&!state.cats.has(e.cat))return false;
    if(state.aud&&e.aud!==state.aud&&e.aud!=="wszyscy"&&state.aud!=="wszyscy")return false;
    if(state.free&&e.price!=="bezplatne")return false;
    if(state.day&&e.date!==state.day)return false;
    return true;
  }).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||"").localeCompare(b.time||""));
}

function render(){
  const f=filter();
  const hasF=state.search||state.cats.size>0||state.aud||state.free||state.day;

  document.getElementById("countInfo").innerHTML=
    "<strong>"+f.length+"</strong> wydarzen z "+EVENTS.length+" "+(hasF?"(filtry aktywne)":"");

  // Categories
  let ch="";
  CATS.forEach(c=>{
    ch+='<button class="pill'+(state.cats.has(c)?" active":"")+'" data-cat="'+c+'" style="'+(state.cats.has(c)?"background:"+CC[c]+";border-color:"+CC[c]:"")+'">'+c+'</button>';
  });
  document.getElementById("catFilters").innerHTML=ch;

  // Controls
  let ctrl='<select id="audSelect"><option value="">Dla kogo?</option>';
  AUDS.forEach(a=>{ctrl+='<option value="'+a+'"'+(state.aud===a?" selected":"")+'>'+AUD_L[a]+'</option>';});
  ctrl+='</select>';
  ctrl+='<button class="btn-filter'+(state.free?" active":"")+'" id="freeBtn">Bezplatne</button>';
  ctrl+='<button class="btn-filter" id="modeBtn">'+(state.mode==="list"?"Kalendarz":"Lista")+'</button>';
  if(hasF) ctrl+='<button class="btn-clear" id="clearBtn">&times; Wyczysc</button>';
  document.getElementById("controls").innerHTML=ctrl;

  // Calendar
  const cs=document.getElementById("calStrip");
  if(state.mode==="cal"){
    cs.style.display="block";
    let cd='<div class="cal-days">';
    DAYS.forEach(d=>{
      const cnt=EVENTS.filter(e=>e.date===d.date).filter(e=>{
        if(state.cats.size>0&&!state.cats.has(e.cat))return false;
        if(state.aud&&e.aud!==state.aud&&e.aud!=="wszyscy")return false;
        if(state.free&&e.price!=="bezplatne")return false;
        return true;
      }).length;
      const sel=state.day===d.date;
      const dw=dow(d.date);
      const we=dw==="So"||dw==="Nd";
      let cls="cal-day";
      if(cnt>0)cls+=" has-events";
      if(sel)cls+=" selected";
      if(we&&!sel)cls+=" weekend";
      cd+='<button class="'+cls+'" data-day="'+d.date+'">';
      cd+='<span class="cal-day-label">'+dw+'</span>';
      cd+='<span class="cal-day-num">'+d.num+'</span>';
      if(cnt>0)cd+='<span class="cal-day-count">'+cnt+'</span>';
      cd+='</button>';
    });
    cd+='</div>';
    cs.innerHTML=cd;
  } else { cs.style.display="none"; }

  // Events
  const el=document.getElementById("eventList");
  if(f.length===0){
    el.innerHTML='<div class="empty"><p>Brak pasujacych wydarzen</p></div>';
    return;
  }

  const byDate={};
  f.forEach(e=>{if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});

  let html="";
  Object.entries(byDate).forEach(([date,evts])=>{
    html+='<div class="date-group"><div class="date-header">'+fmtDate(date)+'<span class="count-badge">'+evts.length+'</span></div>';
    evts.forEach(ev=>{
      const isOpen=state.open===ev.id;
      html+='<div class="event" data-id="'+ev.id+'">';
      html+='<div class="event-row">';
      html+='<div class="event-time">'+(ev.time!=="wg grafiku"&&ev.time!=="wg programu"?ev.time:"--")+'</div>';
      html+='<div class="event-body">';
      html+='<div class="event-title-row">';
      html+='<span class="event-dot" style="background:'+(CC[ev.cat]||"#999")+'"></span>';
      html+='<span class="event-name">'+ev.name+'</span>';
      if(ev.price==="bezplatne")html+='<span class="badge badge-free">FREE</span>';
      if(ev.price==="wyprzedane")html+='<span class="badge badge-sold">SOLD OUT</span>';
      html+='</div>';
      html+='<div class="event-meta"><span class="venue">'+ev.venue+'</span>'+(ev.price!=="bezplatne"&&ev.price!=="wyprzedane"?" &middot; "+ev.price:"")+'</div>';

      if(isOpen){
        html+='<div class="event-detail">';
        html+='<p>'+ev.desc+'</p>';
        if(ev.address)html+='<div class="detail-info"><strong>Adres:</strong> '+ev.address+'</div>';
        if(ev.org)html+='<div class="detail-info"><strong>Organizator:</strong> '+ev.org+'</div>';
        if(ev.contact)html+='<div class="detail-info"><strong>Kontakt:</strong> '+ev.contact+'</div>';
        html+='<div class="event-tags">';
        ev.tags.forEach(t=>{html+='<span class="tag" data-tag="'+t+'">#'+t+'</span>';});
        html+='</div></div>';
      }

      html+='</div></div></div>';
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

// Event delegation
document.addEventListener("click",function(e){
  const pill=e.target.closest("[data-cat]");
  if(pill){const c=pill.dataset.cat;state.cats.has(c)?state.cats.delete(c):state.cats.add(c);render();return;}

  const dayBtn=e.target.closest("[data-day]");
  if(dayBtn){const d=dayBtn.dataset.day;state.day=state.day===d?null:d;render();return;}

  const ev=e.target.closest("[data-id]");
  const tag=e.target.closest("[data-tag]");
  if(tag){e.stopPropagation();state.search=tag.dataset.tag;document.getElementById("search").value=state.search;render();return;}
  if(ev){const id=parseInt(ev.dataset.id);state.open=state.open===id?null:id;render();return;}

  if(e.target.id==="freeBtn"){state.free=!state.free;render();return;}
  if(e.target.id==="modeBtn"){state.mode=state.mode==="list"?"cal":"list";render();return;}
  if(e.target.id==="clearBtn"){state.search="";state.cats=new Set();state.aud="";state.free=false;state.day=null;document.getElementById("search").value="";render();return;}
});

document.addEventListener("change",function(e){
  if(e.target.id==="audSelect"){state.aud=e.target.value;render();}
});

document.getElementById("search").addEventListener("input",function(e){
  state.search=e.target.value;render();
});

render();
</script>
</body>
</html>
