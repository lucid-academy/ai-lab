            <div className="relative flex-1 group">
              <div className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400"><Search size={24} /></div>
              <input type="text" placeholder="Znajdź projekt (tytuł lub ID)..." className="w-full pl-16 pr-8 py-5 bg-slate-50 rounded-3xl border-none focus:ring-4 focus:ring-blue-500/10 transition-all font-semibold text-lg placeholder:text-slate-400" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
            </div>
            <div className="flex items-center gap-3 px-2">
              <div className="flex items-center gap-2 text-slate-400 mr-2">
                <Filter size={20} />
                <span className="text-xs font-black uppercase tracking-widest">Filtry</span>
              </div>
              <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                {CATEGORIES.map(cat => (
                  <button key={cat.name} onClick={() => setActiveCategory(cat.name)} className={`flex items-center gap-2 px-6 py-4 rounded-2xl text-sm font-bold transition-all shrink-0 ${activeCategory === cat.name ? `bg-gradient-to-br ${cat.color} text-white shadow-lg` : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>
                    <cat.icon size={18} /> {cat.name}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>

        <div className="flex flex-wrap gap-2 mb-10 justify-center">
          {DISTRICTS.map(d => (
            <button key={d} onClick={() => setActiveDistrict(d)} className={`px-5 py-2.5 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all ${activeDistrict === d ? 'bg-slate-900 text-white shadow-xl' : 'bg-white border border-slate-200 text-slate-400 hover:border-slate-400 hover:text-slate-700 shadow-sm'}`}>
              {d}
            </button>
          ))}
        </div>

        <div className="flex items-center justify-between mb-8 px-4">
          <p className="text-sm font-bold text-slate-400">Pokazano <span className="text-slate-900">{filteredProjects.length}</span> projektów</p>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
          {filteredProjects.map((p, idx) => (
            <div key={p.id} onClick={() => setSelectedProject(p)} className="group bg-white rounded-[2.5rem] p-8 border border-slate-100 shadow-[0_4px_20px_rgba(0,0,0,0.03)] hover:shadow-[0_20px_40px_rgba(0,0,0,0.08)] hover:-translate-y-2 transition-all duration-500 cursor-pointer relative">
              <div className="flex justify-between items-start mb-6">
                <div className={`w-14 h-14 rounded-2xl bg-gradient-to-br flex items-center justify-center text-white shadow-inner ${CATEGORIES.find(c => c.name === p.category)?.color || 'from-slate-400 to-slate-600'}`}>
                  {React.createElement(CATEGORIES.find(c => c.name === p.category)?.icon || Info, { size: 24 })}
                </div>
                <div className="flex flex-col items-end">
                  <span className="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg uppercase mb-2">ID: {p.id}</span>
                  <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-50 rounded-xl">
                    <TrendingUp size={14} className="text-emerald-500" />
                    <span className="text-xs font-black">POZ. {idx + 1}</span>
                  </div>
                </div>
              </div>
              <h3 className="text-xl font-black text-slate-900 leading-tight mb-4 group-hover:text-blue-600 transition-colors">{p.title}</h3>
              <div className="space-y-4 pt-6 border-t border-slate-50">
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2 text-slate-400 font-bold text-xs uppercase tracking-widest"><MapPin size={14} /> {p.district}</div>
                  <div className="flex items-center gap-1.5 text-slate-900 font-black"><Users size={14} className="text-blue-500" /> {p.votes.toLocaleString()}</div>
                </div>
                <div className="flex items-center justify-between bg-slate-50/50 p-4 rounded-2xl">
                  <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Inwestycja</div>
                  <div className="text-lg font-black text-slate-900 tracking-tight">{p.cost.toLocaleString()} <span className="text-xs text-slate-400">PLN</span></div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {selectedProject && (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-xl z-50 flex items-center justify-center p-4 md:p-12 overflow-hidden" onClick={() => setSelectedProject(null)}>
          <div className="bg-white rounded-[3rem] w-full max-w-4xl max-h-[90vh] overflow-y-auto shadow-2xl relative" onClick={e => e.stopPropagation()}>
            <div className="sticky top-0 bg-white/80 backdrop-blur-md px-8 md:px-12 py-8 border-b border-slate-100 flex justify-between items-center z-20">
              <div>
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-md uppercase">{selectedProject.id}</span>
                  <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">{selectedProject.district}</span>
                </div>
                <h2 className="text-2xl md:text-3xl font-black text-slate-900 tracking-tighter">{selectedProject.title}</h2>
              </div>
              <button onClick={() => setSelectedProject(null)} className="p-4 bg-slate-100 hover:bg-slate-200 rounded-3xl transition-all"><X size={24} /></button>
            </div>
            <div className="p-8 md:p-12 space-y-10">
              <p className="text-slate-600 text-xl leading-relaxed font-medium">{selectedProject.description}</p>
              <div>
                <h4 className="text-xs font-black text-slate-300 uppercase tracking-[0.2em] mb-4">Plan Realizacji</h4>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {selectedProject.actions?.map((action, i) => (
                    <div key={i} className="flex items-center gap-4 bg-slate-50 p-5 rounded-3xl">
                      <div className="w-8 h-8 bg-white border border-slate-100 rounded-xl flex items-center justify-center text-blue-600 shadow-sm">{i + 1}</div>
                      <span className="text-slate-700 font-bold text-sm">{action}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div className="grid grid-cols-2 gap-6">
                <div className="bg-[#0a0a0b] text-white p-8 rounded-[2rem]">
                  <p className="text-3xl font-black">{selectedProject.cost.toLocaleString()} <span className="text-sm text-slate-500">PLN</span></p>
                  <p className="text-xs text-slate-400 mt-1">Koszt całkowity</p>
                </div>
                <div className="bg-[#0a0a0b] text-white p-8 rounded-[2rem]">
                  <p className="text-3xl font-black">{selectedProject.votes.toLocaleString()}</p>
                  <p className="text-xs text-slate-400 mt-1">Głosów poparcia</p>
                </div>
              </div>
              <div className="flex gap-6">
                <div className="flex items-center gap-3"><MapPin size={18} className="text-slate-400"/> <span className="text-sm font-bold">{selectedProject.location}</span></div>
                <div className="flex items-center gap-3"><Target size={18} className="text-slate-400"/> <span className="text-sm font-bold">{selectedProject.target}</span></div>
              </div>
              {selectedProject.notes && (
                <div className="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                  <p className="text-blue-900 text-sm font-bold">{selectedProject.notes}</p>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-40 hidden md:flex items-center gap-2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl border border-white/10">
        <Trophy size={18} className="text-yellow-400" />
        <span className="text-xs font-bold uppercase tracking-widest">Gratulujemy wszystkim projektodawcom!</span>
      </div>
    </div>
  );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
